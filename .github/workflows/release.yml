name: release

# Реліз: git tag v1.0.1 && git push origin v1.0.1
# Actions збере EXE, порахує SHA256 і прикріпить обидва файли до GitHub Release.
# Застосунок на машинах сам побачить новий реліз і запропонує оновитись.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish single-file EXE
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          dotnet publish src/Hard-Duck.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$version
          $pub = 'src/bin/Release/net8.0-windows/win-x64/publish'
          $exe = "$pub/Hard-Duck.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath "$exe.sha256" -NoNewline -Encoding ascii
          # Versioned copies for the GitHub Release
          Copy-Item "$exe"         "$pub/Hard-Duck-v$version.exe"
          Copy-Item "$exe.sha256"  "$pub/Hard-Duck-v$version.exe.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src/bin/Release/net8.0-windows/win-x64/publish/Hard-Duck.exe
            src/bin/Release/net8.0-windows/win-x64/publish/Hard-Duck.exe.sha256
            src/bin/Release/net8.0-windows/win-x64/publish/Hard-Duck-v${{ github.ref_name }}.exe
            src/bin/Release/net8.0-windows/win-x64/publish/Hard-Duck-v${{ github.ref_name }}.exe.sha256
